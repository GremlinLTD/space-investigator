name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. What did you expect vs what actually happened?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `si /some/path`
        2. ...
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Output
      description: Paste the terminal output or error message.
      render: shell

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `si --help` (first line shows version)
      placeholder: "e.g. si 0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help (filesystem type, size, etc.)
